{% set name = "openspliceai" %}
{% set version = "0.0.5" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  git_url: https://github.com/Kuanhao-Chao/OpenSpliceAI.git
  git_rev: v{{ version }}

build:
  noarch: python
  pip_interop_enabled: True
  script: "{{ PYTHON }} -m pip install . --no-deps --ignore-installed -vv"

requirements:
  host:
    - python >=3.9
    - pip
    - pip:
      - mappy >=2.28
      - gffutils >=0.12
      - pyfaidx >=0.8.1.1
      - pysam >=0.22.0
  run:
    - python >=3.9
    - torch >=2.2.1
    - torchaudio >=2.2.1
    - torchvision >=0.17.1
    - numpy >=1.24.4
    - pandas >=1.5.3
    - h5py >=3.9.0
    - tqdm >=4.65.2
    - scikit-learn >=1.4.1.post1
    - biopython >=1.83
    - matplotlib >=3.8.3
    - psutil >=5.9.2

about:
  home: https://github.com/Kuanhao-Chao/OpenSpliceAI
  license: MIT
  summary: "Deep learning framework that decodes splicing across species"
